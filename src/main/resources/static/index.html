<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔍 ChileLingo</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 12px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
        }

        iframe {
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>🔍 ChileLingo</h2>

<input id="search" placeholder="ej: wea, weon..." />
<button onclick="buscar()">Buscar</button>

<div id="results"></div>

<script>
    async function buscar() {
        const q = document.getElementById("search").value;

        const res = await fetch(`http://localhost:8080/search?q=${q}`);
        const data = await res.json();

        const container = document.getElementById("results");
        container.innerHTML = "";

        data.forEach(p => {

            const card = document.createElement("div");
            card.className = "card";

            const videoId = p.videoId;
            const start = p.start;

            card.innerHTML = `
            <div class="text">${p.text}</div>

            <button class="btn" onclick="verVideo('${videoId}', ${start}, this)">
                Ver video ▶
            </button>

            <div class="video-container"></div>
        `;

            container.appendChild(card);
        });
    }

    // abre video embebido
    function verVideo(videoId, start, btn) {

        const container = btn.nextElementSibling;

        container.innerHTML = `
        <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/${videoId}?start=${start}&autoplay=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
        </iframe>
    `;
    }
</script>

</body>
</html>
